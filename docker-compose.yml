version: '3.8'

services:
  lock-in:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lock-in-app
    ports:
      - "3001:3001"
    volumes:
      - lock-in-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped

volumes:
  lock-in-data:
    driver: local
